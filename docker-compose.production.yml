volumes:
  pg_data_production:
  static_volume:
  media_volume:

services:
  db:
    image: postgres:13.10
    container_name: db
    environment:
      - POSTGRES_PASSWORD=kittygram_password
      - POSTGRES_USER=kittygram_user
      - POSTGRES_DB=kittygram
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kittygram_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: annalevina/kittygram_backend
    env_file: .env
    volumes:
      - static_volume:/app/collected_static
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: annalevina/kittygram_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: annalevina/kittygram_gateway
    env_file: .env
    volumes:
      - static_volume:/static/
      - media_volume:/media/
    ports:
      - "9000:80"
    depends_on:
      backend:
        condition: service_healthy